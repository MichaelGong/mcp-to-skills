name: Release

# Publishes @mgong/mcp-to-skills to npm whenever a `vX.Y.Z` tag is pushed.
#
# Auth: classic NPM_TOKEN (Granular Access Token) stored as a repo secret.
# To upgrade to OIDC + provenance later, register this workflow as a
# Trusted Publisher at https://www.npmjs.com/settings/mgong/packages and
# drop the NODE_AUTH_TOKEN env (and add `--provenance` to the publish step).

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test
          pnpm build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
